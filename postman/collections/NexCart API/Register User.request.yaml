$kind: http-request
name: Register User
url: "{{base_url}}/auth/register"
method: POST
body:
  type: json
  content: "{\r

    \  \"name\": \"Test User\",\r

    \  \"email\": \"test4@nexcart.com\",\r

    \  \"password\": \"password123\"\r

    }"
scripts:
  - type: afterResponse
    code: "const res = pm.response.json()\r

      \r

      if (res.success && res.data && res.data.accessToken) {\r

      \    pm.environment.set('access_token', res.data.accessToken)\r

      \    pm.environment.set('refresh_token', res.data.refreshToken)\r

      \    console.log('✅ Tokens saved')\r

      } else {\r

      \    console.log('❌ Failed:', res.message)\r

      }"
    language: text/javascript
