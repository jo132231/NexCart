# version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: nexcart-postgres
    environment:
      POSTGRES_USER: nexcart
      POSTGRES_PASSWORD: nexcart123
      POSTGRES_DB: nexcart_users
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:6
    container_name: nexcart-mongo
    environment:
      MONGO_INITDB_ROOT_USERNAME: nexcart
      MONGO_INITDB_ROOT_PASSWORD: nexcart123
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: nexcart-redis
    ports:
      - "6399:6379"
    restart: unless-stopped
    volumes:
      - redis_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: nexcart-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: nexcart-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: nexcart-zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  elasticsearch:
    image: elasticsearch:8.8.0
    container_name: nexcart-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
  minio:
    image: minio/minio:latest
    container_name: nexcart-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: nexcart
      MINIO_ROOT_PASSWORD: nexcart123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: nexcart-gateway
    ports:
      - "8080:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - redis
      - postgres
      - mongodb
    restart: unless-stopped

volumes:
  postgres_data:
  mongo_data:
  redis_data:
  minio_data:
  es_data:


