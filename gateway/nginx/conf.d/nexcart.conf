server {
    listen 8080;
    server_name localhost;

    # ─── SECURITY HEADERS ──────────────────────────────────────────
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── CORRELATION ID ────────────────────────────────────────────
    # Generate unique ID for every request
    # This traces one request across all services
    set $correlation_id $http_x_correlation_id;
    if ($correlation_id = "") {
        set $correlation_id $request_id;
    }
    add_header X-Correlation-ID $correlation_id always;

    # ─── PROXY SETTINGS ────────────────────────────────────────────
    # Pass important headers to all upstream services
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Correlation-ID $correlation_id;
    proxy_connect_timeout 10s;
    proxy_read_timeout 30s;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # ─── HEALTH CHECK ──────────────────────────────────────────────
    location /health {
        access_log off;
        return 200 '{"status":"ok","service":"api-gateway"}';
        add_header Content-Type application/json;
    }

    # ─── AUTH ROUTES ───────────────────────────────────────────────
    # Strict rate limiting — 5 requests per minute per IP
    location /api/auth/ {
        limit_req zone=auth_limit burst=5 nodelay;
        limit_req_status 429;
        rewrite ^/api/auth/(.*)$ /auth/$1 break;
        proxy_pass http://user_service;
   }

    # ─── USER ROUTES ───────────────────────────────────────────────
    location /api/users/ {
        limit_req zone=ip_limit burst=20 nodelay;

        rewrite ^/api/users/(.*)$ /$1 break;
        proxy_pass http://user_service;
    }

    # ─── PRODUCT ROUTES (public) ───────────────────────────────────
    location /api/products/ {
        limit_req zone=ip_limit burst=50 nodelay;

        rewrite ^/api/products/(.*)$ /products/$1 break;
        proxy_pass http://product_service;
    }

    # ─── SEARCH ROUTES (public) ────────────────────────────────────
    location /api/search/ {
        limit_req zone=ip_limit burst=30 nodelay;

        rewrite ^/api/search/(.*)$ /search/$1 break;
        proxy_pass http://search_service;
    }

    # ─── CART ROUTES ───────────────────────────────────────────────
    location /api/cart/ {
        limit_req zone=ip_limit burst=20 nodelay;

        rewrite ^/api/cart/(.*)$ /cart/$1 break;
        proxy_pass http://cart_service;
    }

    # ─── INVENTORY ROUTES ──────────────────────────────────────────
    location /api/inventory/ {
        limit_req zone=ip_limit burst=20 nodelay;

        rewrite ^/api/inventory/(.*)$ /inventory/$1 break;
        proxy_pass http://inventory_service;
    }

    # ─── ORDER ROUTES ──────────────────────────────────────────────
    location /api/orders/ {
        limit_req zone=user_limit burst=10 nodelay;

        rewrite ^/api/orders/(.*)$ /orders/$1 break;
        proxy_pass http://order_service;
    }

    # ─── PAYMENT ROUTES ────────────────────────────────────────────
    # Webhook gets raw body — special handling
    location /api/payments/webhook {
        limit_req zone=ip_limit burst=20 nodelay;

        rewrite ^/api/payments/(.*)$ /payments/$1 break;
        proxy_pass http://payment_service;
        proxy_pass_request_headers on;
    }

    location /api/payments/ {
        limit_req zone=user_limit burst=5 nodelay;

        rewrite ^/api/payments/(.*)$ /payments/$1 break;
        proxy_pass http://payment_service;
    }

    # ─── NOTIFICATION ROUTES ───────────────────────────────────────
    location /api/notifications/ {
        limit_req zone=ip_limit burst=20 nodelay;

        rewrite ^/api/notifications/(.*)$ /notifications/$1 break;
        proxy_pass http://notification_service;
    }

    # ─── ERROR HANDLING ────────────────────────────────────────────
    error_page 429 = @rate_limited;
    location @rate_limited {
        return 429 '{"success":false,"message":"Too many requests. Please slow down."}';
        add_header Content-Type application/json;
    }

    error_page 502 503 504 = @upstream_error;
    location @upstream_error {
        return 503 '{"success":false,"message":"Service temporarily unavailable"}';
        add_header Content-Type application/json;
    }
}