worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ─── LOGGING FORMAT ────────────────────────────────────────────
    # Structured JSON logs — easy to parse and ship to Elasticsearch
    log_format json_combined escape=json
        '{'
            '"timestamp":"$time_iso8601",'
            '"method":"$request_method",'
            '"path":"$uri",'
            '"status":$status,'
            '"response_time":$request_time,'
            '"bytes_sent":$bytes_sent,'
            '"remote_addr":"$remote_addr",'
            '"user_agent":"$http_user_agent",'
            '"correlation_id":"$http_x_correlation_id",'
            '"service":"$upstream_addr"'
        '}';

    access_log /var/log/nginx/access.log json_combined;

    # ─── PERFORMANCE ───────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    gzip on;
    gzip_types application/json text/plain application/javascript;
    gzip_min_length 1000;

    # ─── RATE LIMITING ZONES ───────────────────────────────────────
    # Zone for IP-based limiting — 10MB shared memory, 10 req/s per IP
    limit_req_zone $binary_remote_addr zone=ip_limit:10m rate=10r/s;

    # Zone for user-based limiting — uses JWT user ID
    limit_req_zone $http_x_user_id zone=user_limit:10m rate=30r/s;

    # Stricter zone for auth endpoints — prevent brute force
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/m;

    # ─── UPSTREAM SERVICES ─────────────────────────────────────────
    # These are your Node.js services
    # host.docker.internal allows Nginx container to reach host machine
    upstream user_service {
        server host.docker.internal:3001;
        keepalive 32;
    }

    upstream product_service {
        server host.docker.internal:3002;
        keepalive 32;
    }

    upstream cart_service {
        server host.docker.internal:3003;
        keepalive 32;
    }

    upstream inventory_service {
        server host.docker.internal:3004;
        keepalive 32;
    }

    upstream order_service {
        server host.docker.internal:3005;
        keepalive 32;
    }

    upstream payment_service {
        server host.docker.internal:3006;
        keepalive 32;
    }

    upstream search_service {
        server host.docker.internal:3007;
        keepalive 32;
    }

    upstream notification_service {
        server host.docker.internal:3008;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}